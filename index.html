<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEST187</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #0f0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #252526;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            border: 2px solid #0f0;
        }
        
        h1 {
            color: #0f0;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5em;
            text-shadow: 0 0 10px #0f0;
        }
        
        .status {
            text-align: center;
            margin: 20px 0;
            font-size: 14px;
        }
        
        .status.active {
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }
        
        .status.loading {
            color: #ff0;
            text-shadow: 0 0 10px #ff0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 WEST187 - ACTIVE</h1>
        <div class="status loading" id="status">⏳ جاري تحميل السكريبت...</div>
    </div>

    <script>
        function loadScript() {
            fetch("https://idrisxd123-187.github.io/WEST187/script.js")
                .then(r => r.text())
                .then(t => {
                    const script = document.createElement("script");
                    script.textContent = t;
                    document.head.appendChild(script);
                    
                    document.getElementById('status').innerHTML = '✓ السكريبت تم تشغيله بنجاح!';
                    document.getElementById('status').className = 'status active';
                    console.log('✓ WEST187 Script loaded successfully!');
                })
                .catch(error => {
                    console.error('❌ خطأ:', error);
                    document.getElementById('status').innerHTML = '✗ خطأ في التحميل: ' + error.message;
                    document.getElementById('status').className = 'status';
                });
        }
        
        // تحميل السكريبت عند فتح الصفحة
        window.addEventListener('DOMContentLoaded', loadScript);
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', loadScript);
        } else {
            loadScript();
        }
    </script>
</body>
</html>
