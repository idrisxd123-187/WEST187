<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEST187</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            background: #1e1e1e;
            color: #d4d4d4;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #252526;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            border: 1px solid #3e3e42;
        }
        
        h1 {
            color: #4ec9b0;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.5em;
        }
        
        pre {
            background: #1e1e1e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 15px;
            overflow-x: auto;
            line-height: 1.5;
            color: #ce9178;
            font-size: 12px;
        }
        
        .line-number {
            color: #858585;
            margin-right: 10px;
            display: inline-block;
            width: 40px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📄 Do you.txt</h1>
        <pre id="content">جاري التحميل...</pre>
    </div>

    <script>
        // تحميل محتوى الملف من المستودع
        fetch('https://raw.githubusercontent.com/idrisxd123-187/WEST187/main/Do%20you.txt')
            .then(response => response.text())
            .then(data => {
                const lines = data.split('\n');
                let html = '';
                lines.forEach((line, index) => {
                    const lineNum = index + 1;
                    html += `<div><span class="line-number">${lineNum}</span>${escapeHtml(line)}</div>`;
                });
                document.getElementById('content').innerHTML = html;
            })
            .catch(error => {
                document.getElementById('content').textContent = 'خطأ في تحميل الملف: ' + error;
            });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
